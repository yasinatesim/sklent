<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sklent">
  <defs>
    <linearGradient id="bk-bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a140d"/>
      <stop offset="1" stop-color="#15291c"/>
    </linearGradient>
    <linearGradient id="bk-a" x1="100" y1="40" x2="100" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="bk-b" x1="100" y1="40" x2="100" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="bk-c" x1="100" y1="40" x2="100" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a7f3d0"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="200" height="200" rx="44" fill="url(#bk-bg)"/>

  <!-- three braided reasoning strands -->
  <g fill="none" stroke-width="9" stroke-linecap="round">
    <path d="M70 48 C 130 78, 70 108, 130 138 C 145 153, 145 153, 138 158" stroke="url(#bk-a)"/>
    <path d="M100 46 C 100 86, 100 116, 100 156" stroke="url(#bk-b)" opacity="0.95"/>
    <path d="M130 48 C 70 78, 130 108, 70 138 C 55 153, 55 153, 62 158" stroke="url(#bk-c)"/>
  </g>

  <!-- BRAID nodes at the crossings -->
  <g fill="#0a140d" stroke="#5eead4" stroke-width="3.5">
    <circle cx="100" cy="63" r="7"/>
    <circle cx="100" cy="100" r="7"/>
    <circle cx="100" cy="137" r="7"/>
  </g>

  <!-- pass/fail loop-back edge -->
  <path d="M150 150 q 26 -50 0 -100" fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 9" opacity="0.7"/>
</svg>
